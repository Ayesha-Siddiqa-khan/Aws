# ─────────────────────────────────────────────────────────────────────────────
# DO NOT store real secrets here.
# The GitHub Actions workflow creates this secret via kubectl during deploy:
#
#   kubectl create secret generic tictactoe-secret \
#     --namespace tictactoe \
#     --from-literal=secret-key="${{ secrets.FLASK_SECRET_KEY }}" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# This file is kept as documentation only.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: tictactoe-secret
  namespace: tictactoe
type: Opaque
stringData:
  secret-key: "REPLACE_WITH_REAL_SECRET_VIA_CI"
