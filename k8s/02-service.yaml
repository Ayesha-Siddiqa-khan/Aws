apiVersion: v1
kind: Service
metadata:
  name: tictactoe-svc
  namespace: tictactoe
  labels:
    app: tictactoe
spec:
  type: LoadBalancer          # Use ClusterIP + Ingress if you already have an ingress controller
  selector:
    app: tictactoe
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
