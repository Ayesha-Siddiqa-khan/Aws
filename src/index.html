<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #2a2a3a;
      --x-color: #ff4d6d;
      --o-color: #4cc9f0;
      --text: #e8e8f0;
      --muted: #555570;
      --win-glow: #ffd700;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(255,77,109,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(76,201,240,0.06) 0%, transparent 50%);
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--x-color), var(--o-color));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    .scoreboard {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      text-align: center;
      min-width: 90px;
      transition: border-color 0.3s;
    }

    .score-card.active { border-color: var(--win-glow); box-shadow: 0 0 12px rgba(255,215,0,0.2); }
    .score-card .label { font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); margin-bottom: 0.3rem; }
    .score-card .value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; line-height: 1; }
    .score-card.x .value { color: var(--x-color); }
    .score-card.o .value { color: var(--o-color); }
    .score-card.draws .value { color: var(--muted); }

    .vs { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; color: var(--muted); }

    .status {
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      height: 1.4rem;
      text-align: center;
      transition: color 0.3s;
    }

    .status.win { color: var(--win-glow); }
    .status.draw { color: var(--muted); }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .cell {
      width: clamp(80px, 20vw, 110px);
      height: clamp(80px, 20vw, 110px);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 7vw, 3.5rem);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #1a1a26;
      border-color: #44445a;
      transform: scale(1.03);
    }

    .cell.taken { cursor: default; }
    .cell.x { color: var(--x-color); }
    .cell.o { color: var(--o-color); }

    .cell.winning {
      border-color: var(--win-glow);
      box-shadow: inset 0 0 20px rgba(255,215,0,0.12), 0 0 16px rgba(255,215,0,0.2);
      animation: pulse 0.8s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: inset 0 0 20px rgba(255,215,0,0.12), 0 0 16px rgba(255,215,0,0.2); }
