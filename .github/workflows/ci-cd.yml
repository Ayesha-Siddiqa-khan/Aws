# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Tic Tac Toe
# Build → Push to ECR → Deploy to self-managed Kubernetes cluster (kubeadm)
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       – IAM user key (ECR access only)
#   AWS_SECRET_ACCESS_KEY   – IAM user secret
#   AWS_REGION              – e.g. us-east-1
#   ECR_REPOSITORY          – ECR repo short name, e.g. tictactoe
#   FLASK_SECRET_KEY        – random string for Flask sessions
#   KUBE_CONFIG             – base64-encoded kubeconfig from your control plane
#                             Run on control plane:
#                             cat ~/.kube/config | base64 -w 0
#                             Then paste the output as this secret value.
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG:      ${{ github.sha }}

jobs:
  # ── 1. Lint & Test ──────────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repo structure
        run: find . -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8

      - name: Lint with flake8
        working-directory: app
        run: |
          flake8 . --max-line-length=120 --exclude=__pycache__

      - name: Tests placeholder
        run: echo "Add pytest tests under app/tests/ when ready."

  # ── 2. Build & Push to ECR ─────────────────────────────────────────────────
  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "Building $IMAGE_URI"
          docker build \
            --tag "$IMAGE_URI" \
            --tag "$LATEST_URI" \
            .

          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "### ✅ Image pushed to ECR" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.build.outputs.image-uri }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── 3. Deploy to self-managed Kubernetes cluster ───────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        run: kubectl get nodes

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Create namespace
        run: kubectl apply -f k8s/00-namespace.yaml

      - name: Create Flask secret
        run: |
          kubectl create secret generic tictactoe-secret \
            --namespace tictactoe \
            --from-literal=secret-key="${{ secrets.FLASK_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create ECR image-pull secret
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region "$AWS_REGION")
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_HOST="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          kubectl create secret docker-registry ecr-secret \
            --namespace tictactoe \
            --docker-server="$ECR_HOST" \
            --docker-username=AWS \
            --docker-password="$ECR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set image in Deployment
        run: |
          IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"
          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE_URI}|g" k8s/01-deployment.yaml
          echo "Deploying image: $IMAGE_URI"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/01-deployment.yaml
          kubectl apply -f k8s/02-service.yaml
          kubectl apply -f k8s/03-hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/tictactoe \
            --namespace tictactoe \
            --timeout=180s

      - name: Show running pods and service
        run: |
          echo "--- Pods ---"
          kubectl get pods -n tictactoe
          echo "--- Service ---"
          kubectl get svc -n tictactoe
          echo "### 🚀 Deploy complete" >> "$GITHUB_STEP_SUMMARY"
        