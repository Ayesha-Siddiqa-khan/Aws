# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — Tic Tac Toe (Flask → ECR → EKS)
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID       – IAM user key with ECR + EKS permissions
#   AWS_SECRET_ACCESS_KEY   – IAM user secret
#   AWS_REGION              – e.g. us-east-1
#   ECR_REPOSITORY          – ECR repo name, e.g. tictactoe
#   EKS_CLUSTER_NAME        – your EKS cluster name
#   FLASK_SECRET_KEY        – random string for Flask sessions
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:   ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  IMAGE_TAG:        ${{ github.sha }}

jobs:
  # ── 1. Lint & Test ───────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 app/ --max-line-length=120 --exclude=__pycache__

      - name: Run tests
        run: |
          # Placeholder – add your pytest tests under app/tests/
          echo "No tests yet — add pytest tests to app/tests/"

  # ── 2. Build & Push to ECR ─────────────────────────────────────────────────
  build-and-push:
    name: Build Docker Image & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    # Only build on pushes to main/master (not PRs)
    if: github.event_name == 'push'

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag & push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_URI="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "Building $IMAGE_URI"
          docker build \
            --tag "$IMAGE_URI" \
            --tag "$LATEST_URI" \
            --cache-from "$LATEST_URI" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image-uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "### ✅ Image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${{ steps.build.outputs.image-uri }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ── 3. Deploy to EKS ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production          # add manual approval gate in GitHub if desired

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name   "$EKS_CLUSTER_NAME"

      - name: Create namespace (idempotent)
        run: |
          kubectl apply -f k8s/00-namespace.yaml

      - name: Create / update Flask secret
        run: |
          kubectl create secret generic tictactoe-secret \
            --namespace tictactoe \
            --from-literal=secret-key="${{ secrets.FLASK_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create ECR image-pull secret
        env:
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.image-uri }}
        run: |
          # Fetch a short-lived ECR token and store it as a k8s docker-registry secret
          ECR_TOKEN=$(aws ecr get-login-password --region "$AWS_REGION")
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_HOST="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          kubectl create secret docker-registry ecr-secret \
            --namespace tictactoe \
            --docker-server="$ECR_HOST" \
            --docker-username=AWS \
            --docker-password="$ECR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Inject image into Deployment manifest
        run: |
          IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"
          sed -i "s|IMAGE_PLACEHOLDER|${IMAGE_URI}|g" k8s/01-deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/01-deployment.yaml
          kubectl apply -f k8s/02-service.yaml
          kubectl apply -f k8s/03-hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/tictactoe \
            --namespace tictactoe \
            --timeout=180s

      - name: Print service endpoint
        run: |
          echo "### 🚀 Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          EXTERNAL_IP=$(kubectl get svc tictactoe-svc \
            --namespace tictactoe \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null \
            || echo "pending...")
          echo "External endpoint: **http://${EXTERNAL_IP}**" >> "$GITHUB_STEP_SUMMARY"
          echo "External endpoint: http://${EXTERNAL_IP}"
