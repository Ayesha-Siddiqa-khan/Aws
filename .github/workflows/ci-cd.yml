name: CI/CD — Build, Push & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ───────────────────────── TEST ─────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        working-directory: app
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint
        working-directory: tictactoe/app
        run: flake8 . --max-line-length=120

      - name: Tests
        run: echo "No tests yet"

  # ───────────────────────── BUILD ─────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        id: build
        working-directory: tictactoe
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          docker build -t $IMAGE_URI -t $LATEST_URI .
          docker push $IMAGE_URI
          docker push $LATEST_URI

          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

  # ───────────────────────── DEPLOY ─────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Create namespace
        run: kubectl apply -f tictactoe/k8s/00-namespace.yaml

      - name: Create Flask secret
        run: |
          kubectl create secret generic tictactoe-secret \
            --namespace tictactoe \
            --from-literal=secret-key="${{ secrets.FLASK_SECRET_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create ECR secret
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region $AWS_REGION)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_HOST="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

          kubectl create secret docker-registry ecr-secret \
            --namespace tictactoe \
            --docker-server=$ECR_HOST \
            --docker-username=AWS \
            --docker-password=$ECR_TOKEN \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests
        run: |
          IMAGE_URI="${{ needs.build-and-push.outputs.image-uri }}"

          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE_URI|g" tictactoe/k8s/01-deployment.yaml

          kubectl apply -f tictactoe/k8s/01-deployment.yaml
          kubectl apply -f tictactoe/k8s/02-service.yaml
          kubectl apply -f tictactoe/k8s/03-hpa.yaml

      - name: Wait rollout
        run: |
          kubectl rollout status deployment/tictactoe \
            --namespace tictactoe \
            --timeout=180s

      - name: Get URL
        run: |
          kubectl get svc -n tictactoe